<title>مزرعة المدينة — نخيل وماعز وأغنام</title>

<style>
:root{--bg:#08090a;--sur:#0f1113;--card:#161a1d;--bdr:#252b2f;--gold:#c8922a;--gL:#e8b84b;--grn:#2d6a4f;--gnL:#52b788;--red:#c1121f;--rL:#e63946;--org:#e07b24;--blu:#1d6fa4;--bL:#48a9d4;--tel:#1a9e7a;--tlL:#2dd4a8;--pur:#6c3483;--prL:#9b59b6;--txt:#e8dcc8;--mut:#8a7d6a;--dim:#4a4035}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);direction:rtl;font-family:'Cairo',sans-serif;color:var(--txt);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:6px}
.gb,.rb,.db,.ob{cursor:pointer;border:none;border-radius:4px;font-family:'Cairo',sans-serif;font-weight:700;padding:.42rem 1rem;font-size:.85rem;transition:all .15s}
.gb{background:var(--gold);color:#0a0800}
.gb:hover{background:var(--gL)}
.rb{background:var(--grn);color:#fff}
.rb:hover{background:var(--gnL)}
.db{background:var(--red);color:#fff;padding:.26rem .55rem;font-size:.7rem}
.db:hover{background:var(--rL)}
.ob{border:1px solid var(--bdr);background:transparent;color:var(--mut);padding:.34rem .8rem;font-size:.77rem;font-weight:600}
.ob:hover,.ob.on{border-color:var(--gL);color:var(--gL);background:#1a1400}
.ob.gn{border-color:var(--gnL);color:var(--gnL);background:#0a1a0a}
.ob.pn{border-color:var(--prL);color:var(--prL);background:#1a0a1a}
.inp{background:var(--sur);border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-family:'Cairo',sans-serif;padding:.42rem .7rem;width:100%;font-size:.85rem;direction:rtl}
.inp:focus{outline:none;border-color:var(--gold)}
.sel{background:var(--sur);border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-family:'Cairo',sans-serif;padding:.4rem .65rem;font-size:.82rem;direction:rtl;width:100%}
.sh{font-family:'Amiri',serif;color:var(--gL);font-size:1.05rem;font-weight:700;margin-bottom:.7rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}}
.stat{background:var(--sur);border-radius:5px;padding:.55rem .75rem;text-align:center}
.statv{font-weight:700;color:var(--gnL);font-size:.95rem;font-family:'Amiri',serif}
.statl{color:var(--dim);font-size:.65rem;margin-top:.1rem}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{padding:.4rem .55rem;text-align:right;color:var(--gL);font-weight:700;font-size:.7rem;border-bottom:2px solid var(--bdr)}
td{padding:.38rem .55rem;border-bottom:1px solid #25282e;color:var(--txt)}
.dot{cursor:pointer;border-radius:50%;transition:transform .1s}
.dot:hover{transform:scale(1.6);z-index:20}
.bar{height:100%;border-radius:3px;transition:width .4s}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--card);border:1px solid var(--bdr);border-radius:8px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:1.2rem;direction:rtl}
#topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:.45rem 1rem;display:flex;align-items:center;gap:.5rem;position:sticky;top:0;z-index:100}
#fsw{background:#0a0c0e;border-bottom:1px solid var(--bdr);display:flex;position:sticky;top:49px;z-index:99}
.fw{flex:1;padding:.5rem 0;cursor:pointer;border:none;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;background:var(--bg);color:var(--dim);border-bottom:2px solid transparent}
.fw.act_p{border-bottom-color:var(--gL);color:var(--gL);background:#1a1408}
.fw.act_g{border-bottom-color:var(--gnL);color:var(--gnL);background:#0a1208}
.fw.act_s{border-bottom-color:var(--prL);color:var(--prL);background:#1a0a1a}
.fw.act_h{border-bottom-color:var(--tlL);color:var(--tlL);background:#081210}
#snav{background:var(--card);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:93px;z-index:98}
#snav::-webkit-scrollbar{display:none}
.sn{padding:.45rem .85rem;cursor:pointer;border:none;font-family:'Cairo',sans-serif;font-size:.76rem;font-weight:600;background:transparent;color:var(--mut);border-bottom:2px solid transparent;white-space:nowrap}
.sn.on{color:var(--gL);border-bottom-color:var(--gL)}
.sn.gn{color:var(--gnL);border-bottom-color:var(--gnL)}
.sn.pn{color:var(--prL);border-bottom-color:var(--prL)}
#pg{padding:1rem;max-width:760px;margin:0 auto;padding-bottom:4rem}
.taskrow{display:flex;align-items:flex-start;gap:.55rem;padding:.5rem 0;border-bottom:1px solid #25282e;cursor:pointer}
.chk{width:20px;height:20px;min-width:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bdr)}
.chk.done{border-color:var(--gnL);background:var(--gnL)}
.chk.done::after{content:"✓";color:#0a0a0a;font-size:.78rem;font-weight:900}
</style>
</head>

var COLS=23,ROWS=22;
function isOut(r,c){
  if(r<3&&c<3)return true;if(r<2&&c<6)return true;if(r===0&&c<9)return true;
  if(r<4&&c>20)return true;if(r<2&&c>18)return true;if(r>19&&c<2)return true;
  if(r>20&&c<5)return true;if(r>21)return true;return false;
}
function buildTrees(){
  var order=[];
  for(var vi=0;vi<VARS.length;vi++){
    if(VARS[vi].id==="unknown")continue;
    for(var k=0;k<VARS[vi].cnt;k++)order.push(VARS[vi].id);
  }
  for(var i=order.length-1;i>0;i--){
    var j=(i*1103515245+12345)%(i+1);
    var tmp=order[i];order[i]=order[j];order[j]=tmp;
  }
  var dist={};
  for(var x=0;x<order.length;x++)dist[x+1]=order[x];
  var arr=[];var id=1;
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      if(isOut(r,c))continue;
      arr.push({id:"T"+("000"+id).slice(-3),row:r,col:c,variety:dist[id]||"unknown",status:"healthy"});
      id++;
    }
  }
  return arr;
}

function ageMo(dob){if(!dob)return null;return Math.floor((Date.now()-new Date(dob).getTime())/2592000000);}
function ageStr(dob){var m=ageMo(dob);if(m===null)return"—";if(m<12)return m+"شهر";return Math.floor(m/12)+"سنة "+(m%12)+"شهر";}
function estVal(a){
  var b=BM[a.br];if(!b)return 0;
  var base=a.sex==="male"?b.pm:(a.sex==="female"?b.pf:b.pf*0.4);
  var m=ageMo(a.dob)||0;
  if(m<3)return Math.round(base*0.15);
  if(m<6)return Math.round(base*0.35);
  if(m<12)return Math.round(base*0.6);
  if(m<24)return Math.round(base*0.85);
  return base;
}
function condL(c){var map={pregnant:"حامل",lactating:"حلوب",dry:"جافة",growing:"نامي",fattening:"تسمين",sick:"مريض",breeding:"تلقيح"};return map[c]||c||"—";}

function predictOff(sireId,damId){var s=BM[sireId];var d=BM[damId];if(!s||!d)return"غير محدد";if(sireId===damId)return s.n+" أصيل";return"½"+s.n+" × ½"+d.n;}

function getUrgent(){
  var alerts=[];
  for(var i=0;i<S.animals.length;i++){
    var a=S.animals[i];
    var m=ageMo(a.dob)||0;
    var evs=(S.ad[a.id]&&S.ad[a.id].events)||[];
    var hasPPR=false,hasCDT=false;
    for(var j=0;j<evs.length;j++){
      if(evs[j].type==="vaccine"){
        var v=(evs[j].val||"");
        if(v.indexOf("PPR")>=0)hasPPR=true;
        if(v.indexOf("CDT")>=0)hasCDT=true;
      }
    }
    if(m>=3&&m<=5&&!hasPPR){alerts.push({id:"u_ppr_"+a.id,tx:"🔴 PPR واجب الآن — "+a.id+" ("+m+" أشهر)",det:"1مل IM مرة واحدة مدى الحياة",p:"c",s:"ص"});}

  }
  return alerts;
}

function render(){
  var pg=document.getElementById("pg");
  pg.style.display="block";
  var mw=document.getElementById("mapwrap");
  if(mw)mw.remove();
  var v=S.view,f=S.farm;
  if(f==="palm"){
    if(v==="map"){renderMap();return;}
    if(v==="tree"){pg.innerHTML=pgPalmTree();return;}
    if(v==="spacing"){pg.innerHTML=pgSpacing();return;}
    if(v==="tasks"){pg.innerHTML=pgTasks("palm");return;}
    if(v==="dis"){pg.innerHTML=pgDis("palm");return;}
    if(v==="yield"){pg.innerHTML=pgYield();return;}
    if(v==="nut"){pg.innerHTML=pgNut();return;}
    if(v==="harv"){pg.innerHTML=pgHarv();return;}
  }
  if(f==="goat"||f==="sheep"){
    if(v==="herd"){pg.innerHTML=pgHerd(f);return;}
    if(v==="animal"){pg.innerHTML=pgAnimal();return;}
    if(v==="vax"){pg.innerHTML=pgVax();return;}
    if(v==="tasks"){pg.innerHTML=pgTasks(f);return;}
    if(v==="dis"){pg.innerHTML=pgDis("animal");return;}
    if(v==="ration"){pg.innerHTML=pgRation(f);return;}
    if(v==="bench"){pg.innerHTML=pgBench(f);return;}
  }
  if(f==="share"){
    if(v==="integ"){pg.innerHTML=pgInteg();return;}
    if(v==="fin"){pg.innerHTML=pgFin();return;}
    if(v==="sync"){pg.innerHTML=pgSync();return;}
  }
  pg.innerHTML="<p style='text-align:center;padding:3rem;color:var(--mut)'>...</p>";
}

// MAP — pure string concat
// ════════════════════════════════════════════════════════════
function renderMap(){
  var pg=document.getElementById("pg");
  pg.style.display="none";
  var CW=26;
  var byPos={};
  for(var i=0;i<S.trees.length;i++){byPos[S.trees[i].row+","+S.trees[i].col]=S.trees[i];}

  var rows=[];
  for(var r=0;r<ROWS;r++){
    var cols=[];
    for(var c=0;c<COLS;c++){
      if(isOut(r,c)){cols.push("<div style='width:"+CW+"px;height:"+CW+"px'></div>");continue;}
      var t=byPos[r+","+c];
      if(!t){cols.push("<div style='width:"+CW+"px;height:"+CW+"px'></div>");continue;}
      var vd=VM[t.variety]||VM.unknown;
      var op=(S.fv!=="all"&&t.variety!==S.fv)?"0.08":"1";
      var dc=t.status==="diseased"?C.rL:(t.status==="warning"?C.org:vd.dot);
      var hasDis=(S.td[t.id]&&S.td[t.id].diseases&&S.td[t.id].diseases.length>0);
      var brd=hasDis?"1.5px solid "+C.rL:"1px solid "+dc+"66";
      cols.push("<div style='width:"+CW+"px;height:"+CW+"px;display:flex;align-items:center;justify-content:center'><div class='dot' data-tid='"+t.id+"' style='width:15px;height:15px;background:"+dc+";opacity:"+op+";border:"+brd+"' title='"+t.id+" — "+vd.n+"'></div></div>");
    }
    rows.push("<div style='display:flex'>"+cols.join("")+"</div>");
  }

  var leg="";
  for(var i=0;i<VARS.length;i++){
    var v=VARS[i];if(v.id==="unknown")continue;
    var lop=(S.fv!=="all"&&S.fv!==v.id)?"0.15":"1";
    leg+="<div onclick=\"TF('"+v.id+"')\" style='display:flex;align-items:center;gap:.25rem;cursor:pointer;opacity:"+lop+"'><div style='width:8px;height:8px;border-radius:50%;background:"+v.dot+"'></div><span style='color:var(--mut);font-size:.65rem'>"+v.n+" ("+v.cnt+")</span></div>";
  }

  var opts="<option value='all'>جميع الأصناف ("+S.trees.length+")</option>";
  for(var i=0;i<VARS.length;i++){
    var v3=VARS[i];if(v3.id==="unknown")continue;
    var sel=(S.fv===v3.id)?" selected":"";
    opts+="<option value='"+v3.id+"'"+sel+">"+v3.n+" ("+v3.cnt+")</option>";
  }

  var html="<div style='display:flex;gap:.4rem;padding:.45rem 1rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--bdr);background:var(--sur)'>"+
    "<select id='mvf' class='sel' style='width:auto;font-size:.75rem;padding:.25rem .5rem' onchange=\"TF(this.value)\">"+opts+"</select>"+
    "<span style='color:var(--mut);font-size:.72rem;margin-right:auto'>انقر على نخلة لفتح ملفها</span>"+
    "<button class='ob' onclick='chgZoom(0.3)'>＋</button>"+
    "<button class='ob' onclick='chgZoom(-0.3)'>－</button>"+
    "<button class='ob' onclick='resetMap()'>↺</button>"+
    "</div>"+
    "<div style='display:flex;gap:.35rem;padding:.3rem 1rem;flex-wrap:wrap;border-bottom:1px solid var(--bdr);background:var(--sur)'>"+leg+"</div>"+
    "<div id='mapcanvas' style='overflow:hidden;position:relative;cursor:grab;user-select:none;height:calc(100vh - 240px);touch-action:none;background:#0a0c0e'>"+
    "<div id='mapinner' style='position:absolute;top:15px;left:15px;transform-origin:top left'>"+rows.join("")+"</div>"+
    "<div style='position:absolute;bottom:10px;left:10px;background:rgba(15,17,19,.92);border:1px solid var(--bdr);border-radius:5px;padding:5px 9px;font-size:.65rem;color:var(--mut);pointer-events:none'><div style='color:var(--gL);font-weight:700'>↑ شمال</div><div>37,000 م² • 502 نخلة</div></div>"+
    "</div>";

  var wrap=document.createElement("div");
  wrap.id="mapwrap";
  wrap.style.cssText="display:flex;flex-direction:column";
  wrap.innerHTML=html;
  document.body.insertBefore(wrap,pg);

  applyTF();
  attachMapEvents();
}
function applyTF(){var inner=document.getElementById("mapinner");if(inner)inner.style.transform="translate("+S.mx+"px,"+S.my+"px) scale("+S.mz+")";}
function chgZoom(d){S.mz=Math.max(0.35,Math.min(4,S.mz+d));applyTF();}
function resetMap(){S.mz=1;S.mx=0;S.my=0;applyTF();}
function TF(vid){
  S.fv=(S.fv===vid)?"all":vid;
  var sel=document.getElementById("mvf");if(sel)sel.value=S.fv;
  var dots=document.querySelectorAll("[data-tid]");
  for(var i=0;i<dots.length;i++){
    var el=dots[i];
    var tid=el.getAttribute("data-tid");
    var tree=null;
    for(var k=0;k<S.trees.length;k++){if(S.trees[k].id===tid){tree=S.trees[k];break;}}
    if(tree)el.style.opacity=(S.fv!=="all"&&tree.variety!==S.fv)?"0.08":"1";
  }
}
function attachMapEvents(){
  var canvas=document.getElementById("mapcanvas");
  if(!canvas)return;
  var drag=false,sx=0,sy=0,sox=0,soy=0,ld2=0;
  canvas.addEventListener("mousedown",function(e){
    if(e.target.getAttribute("data-tid"))return;
    drag=true;sx=e.clientX;sy=e.clientY;sox=S.mx;soy=S.my;
    canvas.style.cursor="grabbing";
  });
  document.addEventListener("mousemove",function(e){
    if(!drag)return;
    S.mx=sox+(e.clientX-sx);S.my=soy+(e.clientY-sy);applyTF();
  });
  document.addEventListener("mouseup",function(){drag=false;var cv=document.getElementById("mapcanvas");if(cv)cv.style.cursor="grab";});
  canvas.addEventListener("click",function(e){
    var tid=e.target.getAttribute("data-tid");if(!tid)return;
    for(var i=0;i<S.trees.length;i++){if(S.trees[i].id===tid){S.selTree=S.trees[i];break;}}
    if(S.selTree){S.view="tree";renderNav();render();}
  });
  canvas.addEventListener("wheel",function(e){
    e.preventDefault();
    S.mz=Math.max(0.35,Math.min(4,S.mz+(e.deltaY>0?-0.12:0.12)));applyTF();
  },{passive:false});
  canvas.addEventListener("touchstart",function(e){
    if(e.touches.length===1&&!e.target.getAttribute("data-tid")){
      drag=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;sox=S.mx;soy=S.my;
    }else if(e.touches.length===2){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      ld2=Math.sqrt(dx*dx+dy*dy);
    }
  },{passive:true});
  canvas.addEventListener("touchmove",function(e){
    if(e.touches.length===1&&drag){
      S.mx=sox+(e.touches[0].clientX-sx);S.my=soy+(e.touches[0].clientY-sy);applyTF();e.preventDefault();
    }else if(e.touches.length===2){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      var nd=Math.sqrt(dx*dx+dy*dy);
      if(ld2>0)S.mz=Math.max(0.35,Math.min(4,S.mz*(nd/ld2)));
      ld2=nd;applyTF();
    }
  },{passive:false});
  canvas.addEventListener("touchend",function(){drag=false;});
}

function renderPalmGroup(title,col,tasks,ck,dk,ckKey){
  if(!tasks.length) return "";
  var done=0;
  for(var i=0;i<tasks.length;i++) if(ck[dk+"-"+tasks[i].id]) done++;
  var h="<div class='card' style='padding:.85rem;margin-bottom:.7rem;border-right:3px solid "+col+"'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem'>";
  h+="<span style='font-weight:700;color:"+col+";font-size:.88rem'>"+title+"</span>";
  h+="<span style='color:"+(done===tasks.length?C.gnL:"var(--mut)")+";font-size:.73rem'>"+done+"/"+tasks.length+"</span></div>";
  for(var i=0;i<tasks.length;i++){
    var t=tasks[i];
    var isDone=!!ck[dk+"-"+t.id];
    var pc=priColor(t.p);
    var isCus=!!t.custom;
    h+="<div onclick=\"TK('"+dk+"','"+t.id+"','"+ckKey+"')\" class='taskrow'>";
    h+="<div class='chk"+(isDone?" done":"")+"'></div>";
    h+="<div style='flex:1'>";
    h+="<div style='font-size:.85rem;color:"+(isDone?"var(--mut)":"var(--txt)")+";text-decoration:"+(isDone?"line-through":"none")+";line-height:1.4'>"+t.tx+"</div>";
    if(t.det) h+="<div style='font-size:.72rem;color:var(--dim);margin-top:.2rem;line-height:1.55'>"+t.det+"</div>";
    if(t.time) h+="<div style='font-size:.68rem;color:var(--mut);margin-top:.15rem'>⏰ "+t.time+"</div>";
    h+="</div>";
    h+="<div style='display:flex;align-items:flex-start;gap:.3rem;flex-shrink:0;padding-top:.25rem'>";
    h+="<div style='width:6px;height:6px;border-radius:50%;background:"+pc+"'></div>";
    if(isCus) h+="<button class='db' onclick=\"event.stopPropagation();DelCT('palm','"+dk+"','"+t.id+"')\">×</button>";
    h+="</div></div>";
  }
  h+="</div>";
  return h;
}

function pgTasksAnimal(mode){
  var today=new Date();
  var dk=today.toISOString().slice(0,10);
  var mo=today.getMonth()+1;
  var dayIdx=today.getDay();
  var dayN=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  var moN=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  var isGoat=(mode==="goat");
  var ac=isGoat?C.gnL:C.prL;
  var isSummer=(mo>=5&&mo<=9);
  var ckKey="ack";
  var ck=ld(ckKey,{});
  var cus=ld("acus",{});
  var todayCus=(cus[dk]||[]);

  // ── BUILD SMART GROUPS from S.animals ──
  var myA=[];
  for(var i=0;i<S.animals.length;i++){
    var b=BM[S.animals[i].br];
    if(b&&((isGoat&&b.t==="goat")||(!isGoat&&b.t==="sheep"))) myA.push(S.animals[i]);
  }

  var g={dry:[],preg:[],lact:[],stud:[],baby:[],teen:[]};
  for(var i=0;i<myA.length;i++){
    var a=myA[i];
    var m=ageMo(a.dob)||0;
    if(a.sex==="male"&&a.cond!=="growing") g.stud.push(a);
    else if(a.cond==="pregnant") g.preg.push(a);
    else if(a.cond==="lactating") g.lact.push(a);
    else if(m<3) g.baby.push(a);
    else if(a.cond==="growing"||m<12) g.teen.push(a);
    else g.dry.push(a);
  }

  // ── RATION CALC ──
  var wfBr={ardi:40,masri:35,boer:75,naimi:45,najdi:50,harri:42,sawakni:38,dorper:65};
  var wmBr={ardi:51,masri:48,boer:120,naimi:65,najdi:75,harri:60,sawakni:55,dorper:100};

  function getBW(a){
    var b=BM[a.br];
    var m=ageMo(a.dob)||12;
    var fw=b?(isGoat?b.wf:b.wf):40;
    var mw=b?(isGoat?b.wm:b.wm):50;
    if(a.cond==="growing"||a.sex==="kid"){
      if(m<1) return fw*0.1;
      if(m<3) return fw*0.2;
      if(m<6) return fw*0.4;
      return fw*0.65;
    }
    if(a.sex==="male") return mw;
    return fw;
  }

  // DM rates (kg DM per kg BW)
  var dmRate={dry:0.022,preg:0.035,lact:0.045,stud:0.025,baby:0.06,teen:0.048};
  // Summer adjustment +10% water, -5% dry feed (heat)
  var summerFactor=isSummer?0.95:1.0;

  function calcGroup(arr,key){
    if(!arr.length) return null;
    var totalBW=0;
    for(var i=0;i<arr.length;i++) totalBW+=getBW(arr[i]);
    var avgBW=totalBW/arr.length;
    var dmPer=Math.round(avgBW*dmRate[key]*summerFactor*100)/100;
    var dmTotal=Math.round(dmPer*arr.length*10)/10;
    var waterPer=Math.round(avgBW*(key==="lact"?0.18:key==="baby"?0.15:isSummer?0.14:0.10));
    var waterTotal=waterPer*arr.length;
    var ids=arr.map(function(a){return a.id;}).join("، ");
    return{n:arr.length,avgBW:Math.round(avgBW),dmPer:dmPer,dmTotal:dmTotal,waterPer:waterPer,waterTotal:waterTotal,ids:ids,key:key};
  }

  var R={
    dry:  calcGroup(g.dry,  "dry"),
    preg: calcGroup(g.preg, "preg"),
    lact: calcGroup(g.lact, "lact"),
    stud: calcGroup(g.stud, "stud"),
    baby: calcGroup(g.baby, "baby"),
    teen: calcGroup(g.teen, "teen")
  };

  // Ration composition (% of DM)
  var comp=[
    {f:"برسيم حجازي طازج",pct:45},
    {f:"شعير مجروش",pct:22},
    {f:"ردة القمح",pct:12},
    {f:"كسب صويا",pct:9},
    {f:"نوى التمر مطحون",pct:5},
    {f:"دبس السكر",pct:2},

    {f:"ملح طعام + كلوريد أمونيوم",pct:2}

function renderAnimalGroup(title,col,tasks,ck,dk,ckKey){
  if(!tasks.length) return "";
  var done=0;
  for(var i=0;i<tasks.length;i++) if(ck[dk+"-"+tasks[i].id]) done++;
  var h="<div class='card' style='padding:.85rem;margin-bottom:.7rem;border-right:3px solid "+col+"'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem'>";
  h+="<span style='font-weight:700;color:"+col+";font-size:.88rem'>"+title+"</span>";
  h+="<span style='color:"+(done===tasks.length?C.gnL:"var(--mut)")+";font-size:.73rem'>"+done+"/"+tasks.length+"</span></div>";
  for(var i=0;i<tasks.length;i++){
    var t=tasks[i];
    var isDone=!!ck[dk+"-"+t.id];
    var pc=priColor(t.p);
    var isCus=!!t.custom;
    h+="<div onclick=\"TK('"+dk+"','"+t.id+"','"+ckKey+"')\" class='taskrow'>";
    h+="<div class='chk"+(isDone?" done":"")+"'></div>";
    h+="<div style='flex:1'>";
    h+="<div style='font-size:.85rem;color:"+(isDone?"var(--mut)":"var(--txt)")+";text-decoration:"+(isDone?"line-through":"none")+";line-height:1.4'>"+t.tx+"</div>";
    if(t.det) h+="<div style='font-size:.72rem;color:var(--dim);margin-top:.2rem;line-height:1.55'>"+t.det+"</div>";
    if(t.time) h+="<div style='font-size:.68rem;color:var(--mut);margin-top:.15rem'>⏰ "+t.time+"</div>";
    h+="</div>";
    h+="<div style='display:flex;align-items:flex-start;gap:.3rem;flex-shrink:0;padding-top:.25rem'>";
    h+="<div style='width:6px;height:6px;border-radius:50%;background:"+pc+"'></div>";
    if(isCus) h+="<button class='db' onclick=\"event.stopPropagation();DelCT('"+t.mode+"','"+dk+"','"+t.id+"')\">×</button>";
    h+="</div></div>";
  }
  h+="</div>";
  return h;
}

function buildHealthCheck(g){

function buildEveningHealth(g,mo){

  if(g.preg.length) lines.push("الحوامل ("+g.preg.ids+"): ابحث عن مخاط أبيض = قرب الولادة");

  if(mo>=5&&mo<=9) lines.push("صيف: هل يلهث أي رأس؟ رش ماء بارد فوراً");

function buildHeadcount(g){
  var parts=[];
  if(g.dry.length) parts.push("جافة: "+g.dry.length+" ("+g.dry.map(function(a){return a.id;}).join("+")+ ")");
  if(g.preg.length) parts.push("حوامل: "+g.preg.length);
  if(g.lact.length) parts.push("مرضعات: "+g.lact.length);
  if(g.stud.length) parts.push("فحل: "+g.stud.map(function(a){return a.id;}).join("+"));
  if(g.baby.length) parts.push("صغار: "+g.baby.length);

function saveCT(mode){
  var txt=(document.getElementById("ctt").value||"").trim();
  if(!txt)return;
  var dk=new Date().toISOString().slice(0,10);
  var key=mode==="palm"?"pcus":"acus";
  var all=ld(key,{});var day=all[dk]||[];
  day.push({id:"ct"+Date.now(),tx:txt,det:document.getElementById("ctd").value,s:document.getElementById("cts").value,p:document.getElementById("ctp").value,custom:true});
  all[dk]=day;sv(key,all);closeModal();render();
}
function DelCT(mode,dk,tid){
  if(!confirm("حذف؟"))return;
  var key=mode==="palm"?"pcus":"acus";
  var all=ld(key,{});var day=all[dk]||[];
  var nd=[];for(var i=0;i<day.length;i++)if(day[i].id!==tid)nd.push(day[i]);
  all[dk]=nd;sv(key,all);render();
}

function pgYield(){
  var yl=S.yields;
  var tot=0;for(var i=0;i<yl.length;i++)tot+=yl[i].kg;
  var fg=0;for(var i=0;i<VARS.length;i++){var b=YB[VARS[i].id];if(b)fg+=b.fg*VARS[i].cnt;}
  var pct=fg>0?Math.round(tot/fg*100):0;
  var rev=0;for(var i=0;i<yl.length;i++){var pp=(YB[yl[i].variety]||{}).pp||0;rev+=yl[i].price>0?yl[i].kg*yl[i].price:yl[i].kg*pp;}

  var h="<div><div class='sh'>📊 سجل الإنتاج</div>";
  h+="<div class='card' style='padding:.9rem;margin-bottom:.85rem;border-right:3px solid "+C.gL+"'>";
  h+="<div class='g3' style='margin-bottom:.7rem'>";
  h+="<div class='stat'><div class='statv' style='color:"+C.gL+"'>"+tot.toLocaleString()+" كجم</div><div class='statl'>الإنتاج المسجل</div></div>";
  h+="<div class='stat'><div class='statv' style='color:"+C.bL+"'>"+fg.toLocaleString()+" كجم</div><div class='statl'>هدف درجة أولى</div></div>";
  h+="<div class='stat'><div class='statv' style='color:"+C.gnL+"'>"+rev.toLocaleString()+" ريال</div><div class='statl'>الإيراد</div></div></div>";
  h+="<div style='background:var(--sur);border-radius:4px;height:10px;overflow:hidden'>";
  h+="<div class='bar' style='width:"+Math.min(pct,100)+"%;background:linear-gradient(90deg,"+C.grn+","+C.gL+")'></div></div></div>";
  h+="<button class='gb' style='margin-bottom:.85rem' onclick='showAddYield()'>+ تسجيل موسم حصاد</button>";

  for(var i=0;i<VARS.length;i++){
    var v=VARS[i];
    var b=YB[v.id];if(!b)continue;
    var actual=0,rv=0;
    for(var j=0;j<yl.length;j++){
      if(yl[j].variety===v.id){
        actual+=yl[j].kg;
        rv+=yl[j].price>0?yl[j].kg*yl[j].price:yl[j].kg*b.pp;
      }
    }
    var fgv=b.fg*v.cnt;
    var pv=fgv>0?Math.round(actual/fgv*100):0;
    var statusColor=actual>0?(pv>=100?C.gnL:(pv>=70?C.org:C.rL)):C.mut;
    var barColor=actual===0?"var(--bdr)":statusColor;
    h+="<div class='card' style='padding:.8rem;margin-bottom:.55rem'>";
    h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem'>";
    h+="<div style='display:flex;align-items:center;gap:.35rem'>";
    h+="<div style='width:8px;height:8px;border-radius:50%;background:"+v.dot+"'></div>";
    h+="<span style='font-weight:700;font-size:.87rem'>"+v.n+"</span>";
    h+="<span style='color:var(--dim);font-size:.7rem'>("+v.cnt+" شجرة)</span></div>";
    h+="<span style='color:"+statusColor+";font-weight:700;font-size:.85rem'>"+(actual>0?actual+" كجم ("+pv+"%)":"—")+"</span></div>";
    h+="<div style='background:var(--sur);border-radius:3px;height:5px;overflow:hidden'>";
    h+="<div class='bar' style='width:"+Math.min(pv,100)+"%;background:"+barColor+"'></div></div>";
    if(actual>0)h+="<div style='margin-top:.28rem;color:"+C.gL+";font-size:.72rem'>الإيراد: "+rv.toLocaleString()+" ريال</div>";
    h+="</div>";
  }
  if(yl.length>0){
    h+="<div class='sh' style='font-size:.9rem;margin-top:1rem'>سجل الحصادات</div>";
    for(var i=yl.length-1;i>=0;i--){
      var y=yl[i];
      var vi=VM[y.variety]||{n:y.variety,dot:"#444"};
      h+="<div class='card' style='padding:.75rem;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center'>";
      h+="<div><div style='display:flex;align-items:center;gap:.35rem'>";
      h+="<div style='width:7px;height:7px;border-radius:50%;background:"+vi.dot+"'></div>";
      h+="<span style='color:"+C.gL+";font-weight:700'>"+vi.n+" — موسم "+y.season+"</span></div>";
      h+="<div style='color:var(--mut);font-size:.75rem'>"+y.kg+" كجم — "+(y.grade||"")+"</div></div>";
      h+="<div style='display:flex;align-items:center;gap:.45rem'>";
      if(y.price>0)h+="<span style='color:"+C.gnL+";font-size:.82rem'>"+(y.kg*y.price).toLocaleString()+" ريال</span>";
      h+="<button class='db' onclick=\"delYield("+i+")\">حذف</button></div></div>";
    }
  }
  h+="</div>";
  return h;
}

  var html="<div style='font-family:Amiri,serif;color:"+C.bL+";font-size:1rem;font-weight:700;margin-bottom:.85rem'>📊 موسم حصاد</div>"+

// HERD
// ════════════════════════════════════════════════════════════
function pgHerd(farmType){
  var isGoat=(farmType==="goat");
  var ac=isGoat?C.gnL:C.prL;
  var icon=isGoat?"🐐":"🐑";
  var myA=[];
  for(var i=0;i<S.animals.length;i++){
    var b=BM[S.animals[i].br];
    if(b&&((isGoat&&b.t==="goat")||(!isGoat&&b.t==="sheep")))myA.push(S.animals[i]);
  }
  var fbr=S.fbr||"all";
  var filtered=[];
  for(var i=0;i<myA.length;i++){
    if(fbr==="all"||(fbr==="female"&&myA[i].sex==="female")||(fbr==="male"&&myA[i].sex==="male")||(fbr==="kid"&&myA[i].sex==="kid")){
      filtered.push(myA[i]);
    }
  }
  var does=0,bucks=0,kids=0,totVal=0;
  for(var i=0;i<myA.length;i++){
    if(myA[i].sex==="female")does++;
    else if(myA[i].sex==="male")bucks++;
    else kids++;
    totVal+=myA[i].pp||estVal(myA[i]);
  }
  var avgTwin=0;
  var typeBreeds=[];
  for(var i=0;i<BREEDS.length;i++){if(BREEDS[i].t===(isGoat?"goat":"sheep"))typeBreeds.push(BREEDS[i]);}
  for(var i=0;i<typeBreeds.length;i++)avgTwin+=typeBreeds[i].twin;
  avgTwin=avgTwin/(typeBreeds.length||1);
  var annual=Math.round(does*(1+avgTwin/100));
  var clsBtn=isGoat?"gn":"pn";

  var h="<div>";
  h+="<div style='font-family:Amiri,serif;color:"+ac+";font-size:1.05rem;font-weight:700;margin-bottom:.7rem'>"+icon+" القطيع — "+myA.length+" رأس</div>";
  h+="<div class='g4' style='margin-bottom:.85rem'>";
  h+="<div class='stat'><div class='statv' style='color:"+ac+"'>"+does+"</div><div class='statl'>إناث</div></div>";
  h+="<div class='stat'><div class='statv' style='color:"+C.gL+"'>"+bucks+"</div><div class='statl'>ذكور</div></div>";
  h+="<div class='stat'><div class='statv' style='color:"+C.bL+"'>"+kids+"</div><div class='statl'>صغار</div></div>";
  h+="<div class='stat'><div class='statv' style='color:"+C.tel+"'>"+totVal.toLocaleString()+"</div><div class='statl'>القيمة الإجمالية (ريال)</div></div>";
  h+="</div>";
  h+="<div class='card' style='padding:.75rem;margin-bottom:.85rem;border-right:3px solid "+ac+"'>";
  h+="<div style='color:"+ac+";font-size:.78rem;font-weight:700'>📈 توقع الإنتاج السنوي</div>";
  h+="<div style='color:var(--mut);font-size:.8rem;margin-top:.25rem'>";
  h+="من "+does+" أنثى × توأمية "+Math.round(avgTwin)+"% = <strong style='color:"+ac+"'>"+annual+" مولود/سنة</strong></div></div>";
  h+="<div style='display:flex;gap:.35rem;margin-bottom:.85rem;flex-wrap:wrap'>";
  h+="<button class='rb' onclick=\"showAddAnim('"+farmType+"')\">+ إضافة "+(isGoat?"ماعزة":"خروف")+"</button>";
  h+="<button class='ob"+(fbr==="all"?" "+clsBtn:"")+"' onclick=\"setFbr('all')\">الكل</button>";
  h+="<button class='ob"+(fbr==="female"?" "+clsBtn:"")+"' onclick=\"setFbr('female')\">إناث</button>";
  h+="<button class='ob"+(fbr==="male"?" "+clsBtn:"")+"' onclick=\"setFbr('male')\">ذكور</button>";
  h+="<button class='ob"+(fbr==="kid"?" "+clsBtn:"")+"' onclick=\"setFbr('kid')\">صغار</button>";
  h+="</div>";

  if(!filtered.length){
    h+="<div style='text-align:center;color:var(--mut);padding:3rem'>لا توجد حيوانات في هذا الفلتر</div>";
  }else{
    h+="<div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.7rem'>";
    for(var i=0;i<filtered.length;i++){
      var a=filtered[i];
      var b=BM[a.br]||{};
      var val=a.pp||estVal(a);
      var sexL=a.sex==="female"?"أنثى":(a.sex==="male"?"ذكر":"صغير");
      h+="<div class='card' style='padding:.85rem;cursor:pointer' onclick=\"selAnim('"+a.id+"')\">";
      h+="<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.45rem'>";
      h+="<div><div style='font-family:Amiri,serif;color:"+ac+";font-size:.95rem;font-weight:700'>"+a.id+"</div>";
      h+="<div style='color:var(--mut);font-size:.75rem'>"+(b.n||a.br)+" • "+sexL+" • "+ageStr(a.dob)+"</div></div>";
      h+="<div style='text-align:left'><div style='color:"+C.tel+";font-size:.75rem;font-weight:700'>"+val.toLocaleString()+" ر</div></div></div>";
      if(a.note)h+="<div style='color:var(--dim);font-size:.7rem;margin-bottom:.4rem'>"+a.note+"</div>";
      h+="<div style='display:flex;justify-content:space-between;align-items:center'>";
      h+="<button class='ob "+clsBtn+"' style='font-size:.68rem;padding:.2rem .5rem' onclick=\"event.stopPropagation();selAnim('"+a.id+"')\">ملف</button>";
      h+="<button class='db' style='font-size:.65rem' onclick=\"event.stopPropagation();delAnim('"+a.id+"')\">حذف</button></div></div>";
    }
    h+="</div>";
  }
  h+="</div>";
  return h;
}

// ════════════════════════════════════════════════════════════
// RATION
// ════════════════════════════════════════════════════════════
function pgRation(farmType){
  var isGoat=(farmType==="goat");
  var ac=isGoat?C.gnL:C.prL;
  var my=[];
  for(var i=0;i<S.animals.length;i++){
    var b=BM[S.animals[i].br];
    if(b&&b.t===(isGoat?"goat":"sheep"))my.push(S.animals[i]);
  }
  if(!my.length)return"<div style='text-align:center;color:var(--mut);padding:3rem'>لا توجد حيوانات في هذا القطيع</div>";

  var groups={pregnant:[],lactating:[],dry:[],growing:[],fattening:[],other:[]};
  for(var i=0;i<my.length;i++){
    var c=my[i].cond||"other";
    if(groups[c])groups[c].push(my[i]);
    else groups.other.push(my[i]);
  }
  var dmReq={pregnant:0.035,lactating:0.045,dry:0.02,growing:0.048,fattening:0.042,other:0.025};
  var sN={pregnant:"حوامل",lactating:"حلوب",dry:"جافة",growing:"نامية",fattening:"تسمين",other:"أخرى"};
  var sC={pregnant:C.prL,lactating:C.gnL,dry:C.mut,growing:C.bL,fattening:C.gL,other:C.org};

  function getWt(a){
    var b=BM[a.br];
    var m=ageMo(a.dob)||12;
    if(!b)return 40;
    if(a.sex==="kid"||(a.sex==="female"&&m<6))return b.wf*0.4;
    if(a.sex==="female")return b.wf;
    return b.wm||50;
  }

  var totalDM=0,totalWater=0;
  var groupRows=[];
  var groupHtml="";
  for(var key in groups){
    var anim=groups[key];
    if(!anim.length)continue;
    var avgWt=0;
    for(var i=0;i<anim.length;i++)avgWt+=getWt(anim[i]);
    avgWt=avgWt/anim.length;
    var dmP=parseFloat((avgWt*dmReq[key]).toFixed(2));
    var dmG=parseFloat((dmP*anim.length).toFixed(1));
    var waterP=(key==="lactating"?avgWt*0.18:(key==="growing"?avgWt*0.12:avgWt*0.1));
    totalDM+=dmG;
    totalWater+=waterP*anim.length;
    var ration=[
      {f:"برسيم حجازي",pct:45},
      {f:"شعير مجروش",pct:22},
      {f:"ردة القمح",pct:12},
      {f:"كسب صويا",pct:9},
      {f:"نوى التمر",pct:5},
      {f:"دبس السكر",pct:1.5},
      {f:"معادن + ملح",pct:1.5+(key==="lactating"?0.5:0)}
    ];
    var totalPct=0;
    for(var i=0;i<ration.length;i++)totalPct+=ration[i].pct;
    for(var i=0;i<ration.length;i++){
      ration[i].pct=parseFloat((ration[i].pct/totalPct*100).toFixed(1));
      ration[i].kg=parseFloat((dmG*ration[i].pct/100).toFixed(2));
    }
    var m1=parseFloat((dmG*0.6).toFixed(1));
    var m2=parseFloat((dmG*0.4).toFixed(1));
    groupRows.push({key:key,n:anim.length,dmG:dmG,m1:m1,m2:m2});
    groupHtml+="<div class='card' style='padding:.85rem;margin-bottom:.85rem;border-right:3px solid "+sC[key]+"'>";
    groupHtml+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem'>";
    groupHtml+="<div style='font-weight:700;color:"+sC[key]+";font-size:.9rem'>"+sN[key]+" ("+anim.length+" رأس)</div>";
    groupHtml+="<div style='text-align:left'><div style='color:"+C.gL+";font-weight:700'>"+dmG+" كجم/يوم</div>";
    groupHtml+="<div style='color:var(--mut);font-size:.7rem'>"+dmP+" كجم/رأس</div></div></div>";
    groupHtml+="<div style='overflow-x:auto'><table>";

function pgBench(farmType){
  var isGoat=(farmType==="goat");
  var ac=isGoat?C.gnL:C.prL;
  var breeds=[];
  for(var i=0;i<BREEDS.length;i++){if(BREEDS[i].t===(isGoat?"goat":"sheep"))breeds.push(BREEDS[i]);}
  var icon=isGoat?"🐐":"🐑";
  var h="<div><div style='color:"+ac+";font-family:Amiri,serif;font-size:1.05rem;font-weight:700;margin-bottom:.7rem'>"+icon+" 📊 المعايير البحثية</div>";
  h+="<div style='display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem'>";
  for(var i=0;i<breeds.length;i++){
    var b=breeds[i];
    h+="<div class='card' style='padding:.9rem;border-right:3px solid "+b.dot+"'>";
    h+="<div style='display:flex;align-items:center;gap:.45rem;margin-bottom:.6rem'>";
    h+="<div style='width:11px;height:11px;border-radius:50%;background:"+b.dot+"'></div>";
    h+="<div style='font-family:Amiri,serif;font-size:1rem;font-weight:700'>"+b.n+"</div></div>";
    var pairs=[["وزن الأنثى",b.wf+" كجم"],["وزن الذكر",b.wm+" كجم"],["ADG",b.adg+" جم/يوم"],["نسبة الذبح",b.dress+"%"],["حليب",b.milk+" كجم/موسم"],["توأمية",b.twin+"%"],["سعر الأنثى",b.pf.toLocaleString()+" ريال"],["سعر الذكر",b.pm.toLocaleString()+" ريال"]];
    h+="<div class='g2' style='gap:.4rem;margin-bottom:.5rem'>";
    for(var j=0;j<pairs.length;j++){
      h+="<div class='stat' style='padding:.4rem'><div style='color:var(--dim);font-size:.6rem'>"+pairs[j][0]+"</div><div style='color:"+C.gL+";font-size:.75rem;font-weight:700;margin-top:.05rem'>"+pairs[j][1]+"</div></div>";
    }
    h+="</div>";
    if(b.notes&&b.notes.length){
      h+="<div style='border-top:1px solid var(--bdr);padding-top:.45rem;margin-top:.45rem'>";
      for(var j=0;j<b.notes.length;j++){
        h+="<div style='display:flex;gap:.3rem;margin-bottom:.2rem'><span style='color:"+ac+";font-size:.7rem'>•</span><span style='color:var(--mut);font-size:.74rem'>"+b.notes[j]+"</span></div>";
      }
      h+="</div>";
    }
    h+="</div>";
  }
  h+="</div></div>";
  return h;
}

function pgFin(){
  var palmRev=0;
  for(var i=0;i<S.yields.length;i++){
    var pp=(YB[S.yields[i].variety]||{}).pp||0;
    palmRev+=S.yields[i].price>0?S.yields[i].kg*S.yields[i].price:S.yields[i].kg*pp;
  }
  var herdVal=0;
  for(var i=0;i<S.animals.length;i++)herdVal+=S.animals[i].pp||estVal(S.animals[i]);
  var goats=0,sheep=0;
  for(var i=0;i<S.animals.length;i++){
    var b=BM[S.animals[i].br];
    if(b){if(b.t==="goat")goats++;else sheep++;}
  }
  var h="<div><div class='sh' style='color:"+C.gL+"'>💰 الملخص المالي</div>";
  h+="<div class='g3' style='margin-bottom:.85rem'>";

  h+="<div class='stat'><div class='statv' style='color:"+C.tlL+"'>"+herdVal.toLocaleString()+"</div><div class='statl'>قيمة القطيع (ريال)</div></div>";

  h+="<div class='card' style='padding:.85rem;margin-bottom:.65rem;border-right:3px solid "+C.gL+"'>";
  h+="<div style='color:"+C.gL+";font-weight:700;font-size:.88rem;margin-bottom:.4rem'>🌴 النخيل (502 شجرة)</div>";
  h+="<div style='color:var(--mut);font-size:.82rem;line-height:1.7'>إيراد محتمل سنوي (سعر سوقي): <strong style='color:"+C.gL+"'>~265,000 ريال</strong><br>";
  h+="مع بيع مباشر للعجوة: <strong style='color:"+C.gnL+"'>+150,000 ريال</strong></div></div>";
  h+="<div class='card' style='padding:.85rem;border-right:3px solid "+C.tlL+"'>";

function exportData(){
  var d={trees:S.trees,td:S.td,animals:S.animals,ad:S.ad,yields:S.yields,pdl:S.pdl,adl:S.adl,exported:new Date().toISOString()};
  var b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="farm_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
}
function importData(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(d.trees)S.trees=d.trees;
      if(d.td)S.td=d.td;
      if(d.animals)S.animals=d.animals;
      if(d.ad)S.ad=d.ad;
      if(d.yields)S.yields=d.yields;
      if(d.pdl)S.pdl=d.pdl;
      if(d.adl)S.adl=d.adl;
      sav_a();sav_t();sav_td();
      sv("yields",S.yields);sv("pdl",S.pdl);sv("adl",S.adl);
      render();alert("تم الاستيراد بنجاح");
    }catch(err){alert("خطأ: "+err.message);}
  };
  reader.readAsText(file);
}
